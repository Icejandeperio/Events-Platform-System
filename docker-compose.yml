services:
  postgres:
    image: postgres:16-alpine
    container_name: tenantkit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tenantkit
      POSTGRES_PASSWORD: tenantkit_dev
      POSTGRES_DB: tenantkit_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tenantkit -d tenantkit_dev']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
