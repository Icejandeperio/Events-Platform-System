name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Conventional Commits drives the version bump and CHANGELOG entry.
          # release-please reads commits since the last release tag and
          # opens a PR with the bumped version + generated CHANGELOG.md.
          release-type: node
