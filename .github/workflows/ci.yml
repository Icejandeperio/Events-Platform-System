name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tenantkit
          POSTGRES_PASSWORD: tenantkit_dev
          POSTGRES_DB: tenantkit_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Superuser — matches POSTGRES_USER/PASSWORD/DB in the service container above.
      DATABASE_URL: postgresql://tenantkit:tenantkit_dev@localhost:5432/tenantkit_dev
      # App role — created by migration 0001_app_role_force_rls.sql (non-BYPASSRLS).
      # Password matches the hardcoded dev credential in that migration.
      APP_DATABASE_URL: postgresql://tenantkit_app:tenantkit_pass@localhost:5432/tenantkit_dev
      BETTER_AUTH_SECRET: ci-test-secret-not-for-production
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # next-env.d.ts is gitignored (auto-generated by Next.js at dev/build time).
      # Recreate the known reference header so tsc --noEmit resolves Next.js types.
      - name: Prepare Next.js types
        run: |
          printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts

      # Apply all migrations (creates tables, RLS policies, app role, FORCE RLS).
      # Must run BEFORE npm run check so integration tests find existing tables.
      - name: Apply database migrations
        run: npm run db:migrate

      - name: Run full check (lint + typecheck + test)
        run: npm run check

      - name: Audit dependencies
        run: npm audit --audit-level=high

  secrets:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE required for private repos (Gitleaks paid plan).
          # Set in repo → Settings → Secrets → GITLEAKS_LICENSE.
          # Public repos: omit this env var entirely.
