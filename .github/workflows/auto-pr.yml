name: Auto-open PR

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'

# Cancel in-flight runs for the same branch so rapid pushes don't race.
concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  open-pr:
    name: Open draft PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Open draft PR (no-op if one already exists)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"

          # Skip if an open PR already exists for this branch.
          EXISTING=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $BRANCH — skipping"
            exit 0
          fi

          # Derive a readable title from the branch name.
          # feat/some-feature-slug  →  "feat: some feature slug"
          TYPE="${BRANCH%%/*}"
          SLUG="${BRANCH#*/}"
          TITLE="${TYPE}: ${SLUG//-/ }"

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$BRANCH" \
            --draft \
            --title "$TITLE" \
            --body "Automated draft PR. Update this description before merging."

          echo "Draft PR opened for $BRANCH"
