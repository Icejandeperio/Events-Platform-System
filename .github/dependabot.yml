version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Manila
    open-pull-requests-limit: 10
    groups:
      # Batch all dev-only deps into one PR to reduce noise.
      dev-dependencies:
        dependency-type: development
        patterns:
          - '*'
    ignore:
      # Pin Next.js and React upgrades to manual review (ADR 0002).
      - dependency-name: next
        update-types: ['version-update:semver-major']
      - dependency-name: react
        update-types: ['version-update:semver-major']
      - dependency-name: react-dom
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Manila
